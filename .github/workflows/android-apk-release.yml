name: Build Android APK (Release, fast)

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  android-release:
    runs-on: ubuntu-latest
    env:
      EXPO_NO_TELEMETRY: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            ~/.bun/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('bun.lock', 'package.json', 'app.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: bun install

      - name: Prebuild Android
        run: bunx expo prebuild --platform android --non-interactive

      - name: Generate temporary release keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$RUNNER_TEMP/release.keystore" \
            -alias release \
            -storepass android \
            -keypass android \
            -dname "CN=Expo Release, OU=CI, O=Local, L=Local, S=Local, C=US" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build APK (release)
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$RUNNER_TEMP/release.keystore" \
            -Pandroid.injected.signing.store.password=android \
            -Pandroid.injected.signing.key.alias=release \
            -Pandroid.injected.signing.key.password=android

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
